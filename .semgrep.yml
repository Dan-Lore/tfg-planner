rules:
  - id: no-todo-implement
    languages: [typescript, javascript]
    message: TODO implement stubs are forbidden (AGENTS.md)
    severity: ERROR
    # Use regex: semgrep `pattern:` treats `//` as division, not a line comment.
    pattern-either:
      - pattern-regex: '//\s*TODO:?\s*implement\b'
      - pattern-regex: '//\s*FIXME:?\s*implement\b'

  - id: no-fake-return-null-placeholder
    languages: [typescript]
    message: Placeholder return null in runtime code
    severity: ERROR
    paths:
      exclude:
        - '*.test.ts'
    pattern-regex: 'return\s+null;\s*//\s*placeholder\b'
