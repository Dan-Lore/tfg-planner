name: Verify

on:
  workflow_call:
    inputs:
      vite_base_path:
        required: true
        type: string
      upload_dist:
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ inputs.vite_base_path }}

      - name: Upload dist artifact
        if: inputs.upload_dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
